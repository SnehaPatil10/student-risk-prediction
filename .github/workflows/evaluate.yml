name: Evaluate Submissions

on:
  push:
    paths:
      - "submissions/**"
  pull_request:
    paths:
      - "submissions/**"

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect changed team folder
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep "^submissions/" | awk -F'/' '{print $2}' | sort -u | head -1)
          echo "team=$CHANGED" >> $GITHUB_OUTPUT
          echo "Detected team: $CHANGED"

      - name: Download ground truth (from secret)
        env:
          GROUND_TRUTH_B64: ${{ secrets.GROUND_TRUTH_B64 }}
        run: |
          mkdir -p evaluation
          echo "$GROUND_TRUTH_B64" | base64 --decode > evaluation/ground_truth.csv

      - name: Run evaluation
        run: |
          if [ -n "${{ steps.detect.outputs.team }}" ]; then
            python evaluation/evaluate.py --team "${{ steps.detect.outputs.team }}"
          else
            python evaluation/evaluate.py --all
          fi

      - name: Commit updated leaderboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard/leaderboard.csv
          git diff --staged --quiet || git commit -m "🏆 Update leaderboard [skip ci]"
          git push